<!DOCTYPE html>
<html>
<head>
    <title>Mark Unavailable</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #333; }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .save-btn { background-color: #9E9E9E; color: white; }
        .cancel-btn { background-color: #666; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🚫 Mark Unavailable</h1>
        <p><strong>{{ fob.vehicle_name }}</strong> will be marked as unavailable.</p>
        <form method="POST">
            <label>Reason (optional):</label>
            <textarea name="reason" placeholder="e.g., MDC issue - reported to I.S., Tire flat - at Central Garage"></textarea>
            <button type="submit" class="save-btn">Mark Unavailable</button>
            <a href="/admin#fobs"><button type="button" class="cancel-btn">Cancel</button></a>
        </form>
    </div>
</body>
</html>
